<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Zengotitabengoa Pans</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --color-primary: #e64c19;
            --color-primary-dark: #c63f14;
            --color-primary-soft: #fde4dc;
            --color-sidebar: #1f1f1f;
            --color-bg: #f8f9fa;
            --color-border: #e9ecef;
            --color-text-soft: #6c757d;
            --color-white: #ffffff;
        }

        body {
            background-color: var(--color-bg);
        }

        .text-primary-custom {
            color: var(--color-primary) !important;
        }

        .bg-primary-custom {
            background-color: var(--color-primary) !important;
        }

        .bg-primary-soft {
            background-color: var(--color-primary-soft) !important;
        }

        .border-primary-custom {
            border-color: var(--color-primary) !important;
        }

        .btn-primary-custom {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: var(--color-white);
        }

        .btn-primary-custom:hover,
        .btn-primary-custom:focus,
        .btn-primary-custom:active {
            background-color: var(--color-primary-dark) !important;
            border-color: var(--color-primary-dark) !important;
            color: var(--color-white) !important;
        }

        .btn-outline-primary-custom {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .btn-outline-primary-custom:hover,
        .btn-outline-primary-custom:focus,
        .btn-outline-primary-custom:active {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: var(--color-white) !important;
        }

        .btn-outline-secondary {
            color: var(--color-primary);
            border-color: var(--color-primary);
        }

        .btn-outline-secondary:hover,
        .btn-outline-secondary:focus,
        .btn-outline-secondary:active {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: var(--color-white) !important;
        }

        .sidebar-custom {
            background-color: var(--color-sidebar);
            min-height: 100vh;
        }

        .sidebar-custom .nav-link {
            color: rgba(255, 255, 255, 0.7);
        }

        .sidebar-custom .nav-link:hover {
            color: var(--color-white);
            background-color: rgba(230, 76, 25, 0.15);
        }

        .sidebar-custom .nav-link.active {
            background-color: var(--color-primary);
            color: var(--color-white);
        }

        .card-stat {
            border-left: 4px solid var(--color-primary);
        }

        .progress-bar-custom {
            background-color: var(--color-primary);
        }

        .badge-price {
            background-color: var(--color-primary);
            color: var(--color-white);
        }

        .icon-box-custom {
            background-color: var(--color-primary-soft);
            color: var(--color-primary);
        }

        .table thead.table-dark-custom th {
            background-color: var(--color-primary);
            color: var(--color-white);
            border-color: var(--color-sidebar);
        }

        .mobile-header {
            background-color: var(--color-sidebar);
        }

        .offcanvas.offcanvas-custom {
            background-color: var(--color-sidebar);
            color: var(--color-white);
        }

        .offcanvas-custom .nav-link {
            color: rgba(255, 255, 255, 0.7);
        }

        .offcanvas-custom .nav-link:hover {
            color: var(--color-white);
            background-color: rgba(230, 76, 25, 0.15);
        }

        .offcanvas-custom .nav-link.active {
            background-color: var(--color-primary);
            color: var(--color-white);
        }
    </style>
</head>

<body>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
